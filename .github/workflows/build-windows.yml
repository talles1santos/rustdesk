name: Build Windows x64 — Suporte Remoto Ti4Works

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  APP_NAME: "Suporte Remoto Ti4Works"
  DEFAULT_RENDEZVOUS_SERVER: "rustdesk.ti4works.com.br"
  DEFAULT_RS_PUB_KEY: "JSoPnMHqpwmruCKMHBJoxwCY6gx8Fu1AeequQLyW5fA="
  DEFAULT_RELAY_SERVER: "rustdesk.ti4works.com.br"
  CARGO_INCREMENTAL: "0"

jobs:
  build-windows-x64:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout (com submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust ────────────────────────────────────────────────────────────
      - name: Instalar Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      # ── Flutter ─────────────────────────────────────────────────────────
      - name: Instalar Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Habilitar Flutter Desktop (Windows)
        run: |
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v

      # ── Dependências nativas ─────────────────────────────────────────────
      - name: Configurar LLVM/Clang (ja instalado no runner)
        run: |
          # O runner windows-2022 ja inclui LLVM 20 - apenas apontamos o path correto
          $clangExe = Get-Command clang -ErrorAction SilentlyContinue
          if ($clangExe) {
            $llvmBin = Split-Path $clangExe.Source
            echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
            Write-Host "LLVM encontrado: $llvmBin"
            clang --version
          } else {
            choco upgrade -y llvm
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          }

      - name: Instalar vcpkg e libs nativas
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" >> $env:GITHUB_ENV
          & "$env:USERPROFILE\vcpkg\vcpkg" install `
            libvpx:x64-windows-static `
            libyuv:x64-windows-static `
            opus:x64-windows-static `
            aom:x64-windows-static

      # ── Patch: servidor, chave e nome ────────────────────────────────────
      - name: Aplicar patch de configuração
        run: |
          # Servidor e chave pública
          (Get-Content libs/hbb_common/src/config.rs) `
            -replace 'rs-ny.rustdesk.com', '${{ env.DEFAULT_RENDEZVOUS_SERVER }}' `
            -replace 'OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=', '${{ env.DEFAULT_RS_PUB_KEY }}' |
            Set-Content libs/hbb_common/src/config.rs

          # Nome do app
          (Get-Content libs/hbb_common/src/config.rs) `
            -replace '"RustDesk"', '"${{ env.APP_NAME }}"' |
            Set-Content libs/hbb_common/src/config.rs

          Write-Host "✅ Patch aplicado em config.rs"
          Select-String -Path libs/hbb_common/src/config.rs -Pattern "ti4works|Ti4Works|APP_NAME" | Select-Object -First 10

      # ── Flutter pub get ───────────────────────────────────────────────────
      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Release (Windows)
        run: |
          python3 .\build.py --flutter
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      # ── Empacotar .exe instalador ─────────────────────────────────────────
      - name: Renomear executável
        run: |
          $src = "flutter\build\windows\x64\runner\Release\rustdesk.exe"
          $dst = "SuporteRemotoTi4Works-windows-x64.exe"
          if (Test-Path $src) {
            Copy-Item $src $dst
            Write-Host "✅ Executável: $dst"
          } else {
            Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.Name -like "*rustdesk*" }
          }

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: SuporteRemotoTi4Works-windows-x64
          path: SuporteRemotoTi4Works-windows-x64.exe
          retention-days: 30

  # ── Release automático ao criar tag ────────────────────────────────────────
  release-windows:
    needs: build-windows-x64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SuporteRemotoTi4Works-windows-x64

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SuporteRemotoTi4Works-windows-x64.exe
          name: "Suporte Remoto Ti4Works ${{ github.ref_name }}"
          body: |
            ## Suporte Remoto Ti4Works — ${{ github.ref_name }}
            Servidor: rustdesk.ti4works.com.br
            Plataforma: Windows x64
